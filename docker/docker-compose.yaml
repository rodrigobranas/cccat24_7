services:
  db_account:
    image: postgres:14.3
    ports:
      - 5432:5432
    volumes:
      - ../database/account.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: app
  db_order:
    image: postgres:14.3
    ports:
      - 5433:5432
    volumes:
      - ../database/order.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: app
  db_projection:
    image: postgres:14.3
    ports:
      - 5434:5432
    volumes:
      - ../database/projection.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: app
  queue:
    image: rabbitmq:4.2-management
    ports:
      - 5672:5672
      - 15672:15672
